<text x="280" y="685" text-anchor="middle" font-size="11" fill="#534AB7">编写 changeset.md，运行测试</text>
<line x1="280" y1="696" x2="280" y2="762" stroke="#73726C" stroke-width="1.5" marker-end="url(#a)"/>

