<text x="280" y="145" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">分析项目</text>
<text x="280" y="163" text-anchor="middle" font-size="11" fill="#0F6E56">阅读代码库、依赖、项目结构</text>
