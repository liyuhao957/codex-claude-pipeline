<text x="532" y="1088" text-anchor="middle" font-size="10" fill="#5F5E5A">或仅重复已拒绝的旧问题</text>
<line x1="390" y1="976" x2="430" y2="1050" stroke="#BBB" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Done -->
<rect x="180" y="1070" width="200" height="44" rx="22" fill="#ECFDF5" stroke="#059669" stroke-width=".5"/>
<text x="280" y="1096" text-anchor="middle" font-size="14" font-weight="500" fill="#065F46">流水线完成</text>

<!-- Severity legend -->
<text x="55" y="1146" font-size="12" font-weight="500" fill="#1A1A19">严重性分级</text>
<rect x="55" y="1158" width="10" height="10" rx="2" fill="#E24B4A"/>
<text x="71" y="1168" font-size="11" fill="#5F5E5A">P0 — 必须修复</text>
<rect x="195" y="1158" width="10" height="10" rx="2" fill="#EF9F27"/>
<text x="211" y="1168" font-size="11" fill="#5F5E5A">P1 — 应该修复</text>
<rect x="345" y="1158" width="10" height="10" rx="2" fill="#B4B2A9"/>
<text x="361" y="1168" font-size="11" fill="#5F5E5A">P2 — 锦上添花（可跳过）</text>

<!-- Key features -->
<text x="55" y="1204" font-size="12" font-weight="500" fill="#1A1A19">核心设计原则</text>
<circle cx="61" cy="1222" r="3" fill="#0F6E56"/>
<text x="70" y="1226" font-size="11" fill="#5F5E5A">每次 Codex 调用都锚定原始需求</text>
<circle cx="61" cy="1244" r="3" fill="#0F6E56"/>
<text x="70" y="1248" font-size="11" fill="#5F5E5A">Codex 只读顾问，Claude Code 负责所有编码</text>
<circle cx="61" cy="1266" r="3" fill="#0F6E56"/>
<text x="70" y="1270" font-size="11" fill="#5F5E5A">Codex 原始输出保存，确保审计透明</text>
<circle cx="61" cy="1288" r="3" fill="#0F6E56"/>
<text x="70" y="1292" font-size="11" fill="#5F5E5A">验证优先：默认假设 Codex 可能是对的</text>

<!-- Phase legend -->
<rect x="55" y="1330" width="10" height="10" rx="3" fill="#5DCAA5"/>
<text x="71" y="1340" font-size="11" fill="#5F5E5A">阶段一：设计</text>
<rect x="175" y="1330" width="10" height="10" rx="3" fill="#AFA9EC"/>
<text x="191" y="1340" font-size="11" fill="#5F5E5A">阶段二：实现</text>
