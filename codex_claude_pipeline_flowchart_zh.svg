<line x1="280" y1="862" x2="280" y2="884" stroke="#73726C" stroke-width="1.5" marker-end="url(#a)"/>

<!-- P3: Codex reviews code -->
<rect x="155" y="884" width="250" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width=".5"/>
<text x="280" y="903" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Codex 审查代码</text>
<text x="280" y="921" text-anchor="middle" font-size="11" fill="#993C1D">审查实际的 git diff 变更</text>
<line x1="280" y1="932" x2="280" y2="954" stroke="#73726C" stroke-width="1.5" marker-end="url(#a)"/>

<!-- P3: Decision -->
<rect x="170" y="954" width="220" height="44" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width=".5"/>
<text x="280" y="980" text-anchor="middle" font-size="13" font-weight="500" fill="#854F0B">存在新的 P0/P1 问题？</text>
<line x1="280" y1="998" x2="280" y2="1070" stroke="#CDCCC6" stroke-width="1" marker-end="url(#a)"/>
<text x="292" y="1022" font-size="11" fill="#639922" font-weight="500">否</text>
<line x1="390" y1="976" x2="430" y2="976" stroke="#EF9F27" stroke-width="1" marker-end="url(#a)"/>
<text x="396" y="969" font-size="11" fill="#854F0B" font-weight="500">是</text>

