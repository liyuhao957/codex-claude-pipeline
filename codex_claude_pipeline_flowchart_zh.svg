<text x="532" y="378" text-anchor="middle" font-size="11" fill="#0F6E56">[事实] → 运行代码验证</text>
<text x="532" y="396" text-anchor="middle" font-size="11" fill="#0F6E56">[权衡] → 提交用户决策</text>
<text x="532" y="414" text-anchor="middle" font-size="11" fill="#0F6E56">[质量] → Claude 自行判断</text>
<text x="532" y="436" text-anchor="middle" font-size="10" fill="#0F6E56">P0: 最多 3 轮 · P1: 最多 2 轮</text>
<path d="M632 370 L648 370 L648 356 L405 356" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#at)"/>
<text x="652" y="366" font-size="9" fill="#0F6E56">↻</text>

<!-- P2: Implement -->
<rect x="155" y="578" width="250" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width=".5"/>
