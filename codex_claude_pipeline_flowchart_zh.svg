<svg width="100%" viewBox="0 0 680 1380" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="at" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">

<!-- Phase backgrounds -->
<rect x="30" y="88" width="620" height="430" rx="16" fill="#E1F5EE" fill-opacity=".35" stroke="#5DCAA5" stroke-width=".5" stroke-opacity=".5"/>
<text x="52" y="112" fill="#085041" font-size="13" font-weight="600">阶段 1</text>
<text x="112" y="112" fill="#0F6E56" font-size="13">设计辩论</text>

<rect x="30" y="538" width="620" height="220" rx="16" fill="#EEEDFE" fill-opacity=".35" stroke="#AFA9EC" stroke-width=".5" stroke-opacity=".5"/>
<text x="52" y="562" fill="#3C3489" font-size="13" font-weight="600">阶段 2</text>
<text x="112" y="562" fill="#534AB7" font-size="13">代码实现</text>

<rect x="30" y="778" width="620" height="430" rx="16" fill="#FAECE7" fill-opacity=".35" stroke="#F0997B" stroke-width=".5" stroke-opacity=".5"/>
<text x="52" y="802" fill="#712B13" font-size="13" font-weight="600">阶段 3</text>
<text x="112" y="802" fill="#993C1D" font-size="13">代码审查</text>

